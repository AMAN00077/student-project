<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Teacher Dashboard</title>

```
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #eef2f3, #dbe9f4);
        margin: 0;
    }

    .container {
        width: 85%;
        margin: 30px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    h2, h3 {
        text-align: center;
        color: #2c3e50;
    }

    /* FORM */
    form.grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 30px;
    }

    form.grid div {
        display: flex;
        flex-direction: column;
    }

    label {
        font-weight: 600;
        margin-bottom: 5px;
    }

    input, select {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 5px rgba(52,152,219,0.3);
    }

    .form-actions {
        grid-column: span 2;
        text-align: center;
    }

    /* BUTTONS */
    button {
        padding: 10px 18px;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-save { background: #3498db; color: white; }
    .btn-predict { background: #27ae60; color: white; }
    .btn-delete { background: #e74c3c; color: white; }
    .btn-download { background: #8e44ad; color: white; }

    button:hover {
        transform: scale(1.05);
    }

    /* TABLE */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    th {
        background: #3498db;
        color: white;
        padding: 10px;
    }

    td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    tr:hover {
        background: #f1f7ff;
    }

    /* BULK UPLOAD */
    .upload-box {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
    }

    @media (max-width: 768px) {
        form.grid {
            grid-template-columns: 1fr;
        }

        .form-actions {
            grid-column: span 1;
        }
    }
</style>
```

</head>

<body>

<div class="container">

```
<h2>👩‍🏫 Teacher Dashboard</h2>

<h3>📥 Upload Student Marks</h3>

<form action="/teacher/add" method="post" class="grid">

    <div><label>Student ID</label><input name="studentId" required></div>
    <div><label>Attendance (%)</label><input type="number" name="attendance" required></div>
    <div><label>Internal Marks</label><input type="number" name="internalMarks" required></div>
    <div><label>Assignment Score</label><input type="number" name="assignmentScore" required></div>
    <div><label>Quiz Score</label><input type="number" name="quizScore" required></div>
    <div><label>Study Hours</label><input type="number" step="0.1" name="studyHours" required></div>
    <div><label>Previous CGPA</label><input type="number" step="0.1" name="previousCgpa" required></div>
    <div><label>Backlogs</label><input type="number" name="backlogs" required></div>

    <div>
        <label>Class Participation</label>
        <select name="classParticipation">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>
    </div>

    <div>
        <label>Submission Regular</label>
        <select name="submissionRegular">
            <option>Yes</option>
            <option>No</option>
        </select>
    </div>

    <div class="form-actions">
        <button class="btn-save">Save Record</button>
    </div>

</form>

<h3>📊 Student Records</h3>

<div style="text-align:center;">
    <a href="/teacher/download-records">
        <button class="btn-download">⬇ Download Records</button>
    </a>
</div>

<table>
    <tr>
        <th>ID</th>
        <th>Attendance</th>
        <th>Marks</th>
        <th>Participation</th>
        <th>Submission</th>
        <th>Action</th>
    </tr>

    <tr th:each="r : ${records}">
        <td th:text="${r.studentId}"></td>
        <td th:text="${r.attendance}"></td>
        <td th:text="${r.internalMarks}"></td>
        <td th:text="${r.classParticipation}"></td>
        <td th:text="${r.submissionRegular}"></td>

        <td>
            <form action="/teacher/predict" method="post" style="display:inline;">
                <input type="hidden" name="studentId" th:value="${r.studentId}">
                <button class="btn-predict">Predict</button>
            </form>

            <form action="/teacher/delete" method="post" style="display:inline;">
                <input type="hidden" name="studentId" th:value="${r.studentId}">
                <button class="btn-delete">Delete</button>
            </form>
        </td>
    </tr>
</table>
```

</div>

<div class="container">


<h3>📂 Bulk Prediction</h3>

<form action="/teacher/upload-excel" method="post" enctype="multipart/form-data" class="upload-box">
    <input type="file" name="file" required>
    <button class="btn-predict">Upload & Predict</button>
</form>


</div>

</body>
</html>
