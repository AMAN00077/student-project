<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Teacher Dashboard</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 85%;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.25);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        h3 {
            color: #34495e;
            margin-bottom: 15px;
        }

        /* ✅ GRID FIX */
        form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px 25px;
            margin-bottom: 30px;
        }

        form div {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        /* ✅ INPUT + SELECT SAME SIZE */
        input, select {
            width: 100%;
            padding: 10px;
            height: 42px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }

        .form-actions {
            grid-column: span 2;
            text-align: center;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-save { background: #3498db; color: white; }
        .btn-predict { background: #27ae60; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-download { background: #8e44ad; color: white; margin-right: 10px; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #3498db;
            color: white;
            padding: 10px;
        }

        td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        /* ✅ Responsive (Mobile) */
        @media (max-width: 768px) {
            form {
                grid-template-columns: 1fr;
            }

            .form-actions {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h2>👩‍🏫 Teacher Dashboard</h2>

    <h3>📥 Upload Student Marks</h3>

    <form action="/teacher/add" method="post">

        <div>
            <label>Student ID</label>
            <input name="studentId" required>
        </div>

        <div>
            <label>Attendance (%)</label>
            <input type="number" name="attendance" min="0" max="100" required>
        </div>

        <div>
            <label>Internal Marks</label>
            <input type="number" name="internalMarks" min="0" max="100" required>
        </div>

        <div>
            <label>Assignment Score</label>
            <input type="number" name="assignmentScore" min="0" max="100" required>
        </div>

        <div>
            <label>Quiz Score</label>
            <input type="number" name="quizScore" min="0" max="100" required>
        </div>

        <div>
            <label>Study Hours / Day</label>
            <input type="number" step="0.1" name="studyHours" min="0" max="24" required>
        </div>

        <div>
            <label>Previous CGPA</label>
            <input type="number" step="0.1" name="previousCgpa" min="0" max="10" required>
        </div>

        <div>
            <label>Backlogs</label>
            <input type="number" name="backlogs" min="0" max="10" required>
        </div>

        <div>
            <label>Class Participation</label>
            <select name="classParticipation" required>
                <option value="">Select</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <div>
            <label>Submission Regular</label>
            <select name="submissionRegular" required>
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">Save Record</button>
        </div>

    </form>

    <hr>

    <h3>📊 All Student Records</h3>

    <div style="text-align:center; margin-bottom:20px;">
        <a href="/teacher/download-records">
            <button class="btn-download">⬇ Student Records</button>
        </a>
    </div>

    <table>
        <tr>
            <th>Student ID</th>
            <th>Attendance (%)</th>
            <th>Internal Marks</th>
            <th>Participation</th>
            <th>Submission</th>
            <th>Actions</th>
        </tr>

        <tr th:each="r : ${records}">
            <td th:text="${r.studentId}"></td>
            <td th:text="${r.attendance}"></td>
            <td th:text="${r.internalMarks}"></td>
            <td th:text="${r.classParticipation}"></td>
            <td th:text="${r.submissionRegular}"></td>

            <td>
                <form action="/teacher/predict" method="post" style="display:inline;">
                    <input type="hidden" name="studentId" th:value="${r.studentId}">
                    <button class="btn-predict">Predict</button>
                </form>

                <form action="/teacher/delete" method="post" style="display:inline;">
                    <input type="hidden" name="studentId" th:value="${r.studentId}">
                    <button class="btn-delete">Delete</button>
                </form>
            </td>
        </tr>
    </table>

</div>

<div class="container">

    <h3>📂 Bulk Prediction (Upload Excel)</h3>

    <form action="/teacher/upload-excel" method="post" enctype="multipart/form-data"
          style="display:flex; gap:15px; justify-content:center; margin-bottom:30px;">

        <input type="file" name="file" required>

        <button type="submit" class="btn-predict">
            📊 Upload & Predict
        </button>

    </form>

</div>

</body>
</html>
