<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Performance Prediction</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

    .card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);
        padding: 50px;
        border-radius: 20px;
        text-align: center;
        width: 500px;
        color: white;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .logo {
        font-size: 22px;
        margin-bottom: 20px;
        color: #00e6ff;
    }

    h1 {
        font-size: 36px;
        color: #ffd700;
        margin-bottom: 15px;
    }

    p {
        font-size: 16px;
        color: #ddd;
        margin-bottom: 30px;
    }

    .btn {
        background: #ffcc00;
        color: black;
        padding: 12px 25px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: bold;
        box-shadow: 0 0 20px rgba(255,204,0,0.6);
        transition: 0.3s;
    }

    .btn:hover {
        background: #ffaa00;
        transform: scale(1.05);
    }
</style>

</head>

<body>

<div class="card">


<div class="logo">
    🎓 Intelligent Prediction System
</div>

<h1>
    Student Performance Prediction System
</h1>

<p>
    AI-powered system to analyze student data and predict performance,
    risk level, and academic outcomes using Machine Learning.
</p>

<a href="/login" class="btn">
    Enter System
</a>

</div>

</body>
</html>
