<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Performance Trend</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #eef2f3, #dbe9f4);
        margin: 0;
    }

    .container {
        width: 65%;
        margin: 40px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        text-align: center;
    }

    h2 {
        color: #2c3e50;
        margin-bottom: 25px;
    }

    canvas {
        margin-top: 20px;
    }

    .info-box {
        margin-top: 25px;
        padding: 15px;
        background: #f4f6f7;
        border-radius: 10px;
        font-size: 15px;
        color: #34495e;
    }

    /* BUTTON */
    .btn {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 20px;
        background: linear-gradient(45deg, #3498db, #5dade2);
        color: white;
        text-decoration: none;
        border-radius: 25px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
    }
</style>

</head>

<body>

<div class="container">
    <h2>📈 Student Performance Trend</h2>


<canvas id="cgpaChart"
        th:data-previous="${previousCgpa}"
        th:data-predicted="${predictedCgpa}">
</canvas>

<div class="info-box">
    <p><b>Previous CGPA:</b> <span th:text="${previousCgpa}"></span></p>
    <p><b>Predicted CGPA:</b> <span th:text="${predictedCgpa}"></span></p>
</div>

<a class="btn" href="/student/dashboard">⬅ Back to Dashboard</a>


</div>

<script>
    const canvas = document.getElementById("cgpaChart");

    const previous = parseFloat(canvas.getAttribute("data-previous"));
    const predicted = parseFloat(canvas.getAttribute("data-predicted"));

    new Chart(canvas, {
        type: 'line',
        data: {
            labels: ['Previous CGPA', 'Predicted CGPA'],
            datasets: [{
                label: 'CGPA Trend',
                data: [previous, predicted],
                borderColor: '#3498db',
                backgroundColor: 'rgba(52,152,219,0.2)',
                borderWidth: 3,
                tension: 0.4,
                fill: true,
                pointRadius: 6
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: {
                        font: {
                            size: 14
                        }
                    }
                }
            },
            scales: {
                y: {
                    min: 0,
                    max: 10,
                    title: {
                        display: true,
                        text: 'CGPA'
                    }
                }
            }
        }
    });
</script>

</body>
</html>
