<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Prediction Result</title>


<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #eef2f3, #dbe9f4);
        margin: 0;
        padding: 0;
    }

    .container {
        width: 80%;
        margin: 40px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    .title {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 30px;
    }

    /* RESULT CARDS */
    .result-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 20px;
    }

    .card {
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        color: white;
    }

    .pass-card { background: #2ecc71; }
    .fail-card { background: #e74c3c; }
    .cgpa-card { background: #3498db; }
    .risk-low { background: #27ae60; }
    .risk-medium { background: #f39c12; }
    .risk-high { background: #c0392b; }

    .card h3 {
        margin: 0;
    }

    .card p {
        font-size: 22px;
        font-weight: bold;
        margin-top: 10px;
    }

    /* INFO BOXES */
    .box {
        padding: 20px;
        margin-top: 20px;
        border-radius: 10px;
    }

    .reason-box {
        background: #fdecea;
        border-left: 6px solid #e74c3c;
    }

    .suggestion-box {
        background: #eafaf1;
        border-left: 6px solid #2ecc71;
    }

    /* TABLE */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }

    table th {
        background: #3498db;
        color: white;
        padding: 10px;
    }

    table td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
    }

    /* BUTTON */
    .back-btn {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 20px;
        background: linear-gradient(45deg, #3498db, #5dade2);
        color: #ffffff;
        text-decoration: none;
        border-radius: 25px;
        font-weight: bold;
        transition: 0.3s;
    }

    .back-btn:hover {
        transform: scale(1.05);
    }

    @media (max-width: 768px) {
        .result-grid {
            grid-template-columns: 1fr;
        }
    }
</style>


</head>

<body>

<div class="container">

```
<h2 class="title">📊 Prediction Result</h2>

<!-- RESULT CARDS -->
<div class="result-grid">

    <!-- PASS / FAIL -->
    <div th:classappend="${passFail == 'Pass'} ? 'card pass-card' : 'card fail-card'">
        <h3>Pass / Fail</h3>
        <p th:text="${passFail}"></p>
    </div>

    <!-- CGPA -->
    <div class="card cgpa-card">
        <h3>Predicted CGPA</h3>
        <p th:text="${predictedCgpa}"></p>
    </div>

    <!-- RISK -->
    <div th:classappend="
        ${riskLevel == 'Low'} ? 'card risk-low' :
        (${riskLevel == 'Medium'} ? 'card risk-medium' : 'card risk-high')">
        <h3>Risk Level</h3>
        <p th:text="${riskLevel}"></p>
    </div>

</div>

<!-- WHY -->
<div class="box reason-box">
    <h3>Why this prediction?</h3>
    <p th:text="${reason}"></p>
</div>

<!-- SUGGESTION -->
<div class="box suggestion-box">
    <h3>Recommended Study Plan</h3>
    <p th:text="${suggestion}"></p>
</div>

<!-- FEATURE IMPORTANCE -->
<div th:if="${explanation != null}">
    <h3>Feature Importance (XAI)</h3>

    <table>
        <tr>
            <th>Feature</th>
            <th>Impact (%)</th>
        </tr>

        <tr th:each="entry : ${explanation}">
            <td th:text="${entry.key}"></td>
            <td th:text="${entry.value}"></td>
        </tr>
    </table>
</div>

<a class="back-btn" href="/student/dashboard">⬅ Back to Dashboard</a>


</div>

</body>
</html>
