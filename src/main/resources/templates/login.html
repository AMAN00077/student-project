<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>


<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-box {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);
        padding: 40px;
        width: 350px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        text-align: center;
        color: white;
    }

    h2 {
        margin-bottom: 25px;
        color: #ffd700;
        font-weight: 600;
    }

    .form-group {
        margin-bottom: 18px;
        text-align: left;
    }

    label {
        display: block;
        margin-bottom: 6px;
        color: #ddd;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 14px;
    }

    input:focus {
        box-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        background: #ffd700;
        color: black;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(255,215,0,0.6);
        transition: 0.3s;
    }

    button:hover {
        background: #ffcc00;
        transform: scale(1.05);
    }

    .error {
        margin-top: 15px;
        color: #ff4d4d;
        font-weight: bold;
        text-align: center;
    }

</style>

</head>

<body>

<div class="login-box">
    <h2>🎓 Student Performance System</h2>

<form action="/login" method="post">

    <div class="form-group">
        <label>Email</label>
        <input type="text" name="email" required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
    </div>

    <button type="submit">Login</button>
</form>

<p class="error" th:text="${error}"></p>


</div>

</body>
</html>
