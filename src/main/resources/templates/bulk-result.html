<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bulk Prediction Result</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 85%;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #3498db;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        tr:hover {
            background-color: #f2f2f2;
        }

        .btn {
            display: inline-block;
            margin: 15px 10px;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            color: white;
        }

        .btn-back {
            background-color: #3498db;
        }

        .btn-back:hover {
            background-color: #21618c;
        }

        .btn-download {
            background-color: #27ae60;
        }

        .btn-download:hover {
            background-color: #1e8449;
        }

        .btn-container {
            text-align: center;
            margin-top: 20px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>📊 Bulk Prediction Result</h2>

    <table>
        <tr>
            <th>Student ID</th>
            <th>Attendance</th>
            <th>Pass / Fail</th>
            <th>Risk Level</th>
            <th>Predicted CGPA</th>
        </tr>

        <tr th:each="p : ${predictions}">
            <td th:text="${p.studentId}"></td>
            <td th:text="${p.attendance}"></td>
            <td th:text="${p.pass_fail}"></td>
            <td th:text="${p.risk}"></td>
            <td th:text="${p.cgpa}"></td>
        </tr>
    </table>

    <div class="btn-container">

        <!-- 🔥 DOWNLOAD BUTTON -->
        <form action="/teacher/download-predictions" method="post" style="display:inline;">
            <button type="submit" class="btn btn-download">
                📥 Download Prediction Excel
            </button>
        </form>

        <!-- BACK BUTTON -->
        <a href="/teacher/dashboard" class="btn btn-back">
            ⬅ Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
