<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bulk Prediction Result</title>


<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #eef2f3, #dbe9f4);
        margin: 0;
    }

    .container {
        width: 85%;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    th {
        background: #3498db;
        color: white;
        padding: 12px;
    }

    td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: center;
    }

    tr:hover {
        background-color: #f1f7ff;
    }

    /* RESULT COLORS */
    .pass { color: #2ecc71; font-weight: bold; }
    .fail { color: #e74c3c; font-weight: bold; }

    .low { color: #27ae60; }
    .medium { color: #f39c12; }
    .high { color: #c0392b; }

    /* BUTTONS */
    .btn {
        display: inline-block;
        margin: 15px 10px;
        padding: 12px 22px;
        border-radius: 25px;
        font-weight: bold;
        text-decoration: none;
        color: white;
        transition: 0.3s;
    }

    .btn-back {
        background: linear-gradient(45deg, #3498db, #5dade2);
    }

    .btn-download {
        background: linear-gradient(45deg, #27ae60, #52be80);
    }

    .btn:hover {
        transform: scale(1.05);
    }

    .btn-container {
        text-align: center;
        margin-top: 20px;
    }

</style>


</head>

<body>

<div class="container">


<h2>📊 Bulk Prediction Result</h2>

<table>
    <tr>
        <th>Student ID</th>
        <th>Attendance</th>
        <th>Pass / Fail</th>
        <th>Risk Level</th>
        <th>Predicted CGPA</th>
    </tr>

    <tr th:each="p : ${predictions}">
        <td th:text="${p.studentId}"></td>
        <td th:text="${p.attendance}"></td>

        <!-- PASS FAIL COLOR -->
        <td th:text="${p.pass_fail}"
            th:classappend="${p.pass_fail == 'Pass'} ? 'pass' : 'fail'">
        </td>

        <!-- RISK COLOR -->
        <td th:text="${p.risk}"
            th:classappend="
                ${p.risk == 'Low'} ? 'low' :
                (${p.risk == 'Medium'} ? 'medium' : 'high')">
        </td>

        <td th:text="${p.cgpa}"></td>
    </tr>
</table>

<div class="btn-container">

    <form action="/teacher/download-predictions" method="post" style="display:inline;">
        <button type="submit" class="btn btn-download">
            📥 Download Excel
        </button>
    </form>

    <a href="/teacher/dashboard" class="btn btn-back">
        ⬅ Back to Dashboard
    </a>

</div>


</div>

</body>
</html>
